name: 🔧 Setup SmartZap ↔ NossoCRM Integration

on:
  workflow_dispatch:
    inputs:
      vercel_token:
        description: 'Vercel Token (vcp_...)'
        required: true
        type: string
      supabase_token:
        description: 'Supabase Token (sbp_...)'
        required: true
        type: string
      smartzap_api_key:
        description: 'SmartZap API Key (painel SmartZap → Settings → API Key)'
        required: true
        type: string

env:
  SUPABASE_PROJECT_REF: ofiefpwrbmjebjbbcdig
  WEBHOOK_SECRET: 2b26c131355cc8141c917c296c3262f04dbd75c62c6bd8f0f5e695c23b673ce4
  NOSSOCRM_PROJECT: nossocrm
  SMARTZAP_PROJECT: smartzap

jobs:
  setup:
    name: Configure Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Mascara os tokens nos logs
      - name: Mask secrets
        run: |
          echo "::add-mask::${{ github.event.inputs.vercel_token }}"
          echo "::add-mask::${{ github.event.inputs.supabase_token }}"
          echo "::add-mask::${{ github.event.inputs.smartzap_api_key }}"

      # -----------------------------------------------------------------------
      - name: Install Supabase CLI
        run: |
          RELEASE=$(curl -sf https://api.github.com/repos/supabase/cli/releases/latest | jq -r '.tag_name')
          curl -fsSL "https://github.com/supabase/cli/releases/download/${RELEASE}/supabase_linux_amd64.tar.gz" -o supabase.tar.gz
          tar -xzf supabase.tar.gz
          sudo mv supabase /usr/local/bin/
          supabase --version

      # -----------------------------------------------------------------------
      - name: Get Supabase API keys
        id: supa
        env:
          SUPABASE_ACCESS_TOKEN: ${{ github.event.inputs.supabase_token }}
        run: |
          KEYS=$(curl -sf "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/api-keys" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}")

          ANON=$(echo "$KEYS"    | jq -r '.[] | select(.name=="anon")         | .api_key')
          SERVICE=$(echo "$KEYS" | jq -r '.[] | select(.name=="service_role") | .api_key')

          echo "::add-mask::${ANON}"
          echo "::add-mask::${SERVICE}"

          echo "url=https://${SUPABASE_PROJECT_REF}.supabase.co" >> "$GITHUB_OUTPUT"
          echo "anon=${ANON}"                                     >> "$GITHUB_OUTPUT"
          echo "service=${SERVICE}"                               >> "$GITHUB_OUTPUT"
          echo "✅ Supabase credentials obtained"

      # -----------------------------------------------------------------------
      - name: Run NossoCRM migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ github.event.inputs.supabase_token }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push
          echo "✅ Migration applied"

      # -----------------------------------------------------------------------
      - name: Get Vercel project URLs
        id: vercel
        env:
          VERCEL_TOKEN: ${{ github.event.inputs.vercel_token }}
        run: |
          get_url() {
            local PROJECT="$1"
            local DATA
            DATA=$(curl -sf "https://api.vercel.com/v9/projects/${PROJECT}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}")
            # Try aliases first, fallback to <project>.vercel.app
            local URL
            URL=$(echo "$DATA" | jq -r '
              (.alias // []) |
              map(select(test("\\.vercel\\.app$") and (startswith("https://") | not))) |
              if length > 0 then "https://\(.[0])"
              else empty end' 2>/dev/null)
            if [ -z "$URL" ]; then
              URL=$(echo "$DATA" | jq -r '"https://\(.name).vercel.app"')
            fi
            echo "$URL"
          }

          NOSSOCRM_URL=$(get_url "$NOSSOCRM_PROJECT")
          SMARTZAP_URL=$(get_url "$SMARTZAP_PROJECT")

          echo "nossocrm=${NOSSOCRM_URL}" >> "$GITHUB_OUTPUT"
          echo "smartzap=${SMARTZAP_URL}"  >> "$GITHUB_OUTPUT"
          echo "NossoCRM: ${NOSSOCRM_URL}"
          echo "SmartZap:  ${SMARTZAP_URL}"

      # -----------------------------------------------------------------------
      - name: Configure NossoCRM env vars (Vercel)
        env:
          VERCEL_TOKEN:     ${{ github.event.inputs.vercel_token }}
          SUPABASE_URL:     ${{ steps.supa.outputs.url }}
          SUPABASE_ANON:    ${{ steps.supa.outputs.anon }}
          SUPABASE_SVC:     ${{ steps.supa.outputs.service }}
          SMARTZAP_URL:     ${{ steps.vercel.outputs.smartzap }}
          NOSSOCRM_URL:     ${{ steps.vercel.outputs.nossocrm }}
          SMARTZAP_API_KEY: ${{ github.event.inputs.smartzap_api_key }}
        run: |
          PROJECT_ID=$(curl -sf "https://api.vercel.com/v9/projects/${NOSSOCRM_PROJECT}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" | jq -r '.id')

          set_env() {
            local KEY="$1" VALUE="$2"
            # Remove existing value(s) for this key
            curl -sf "https://api.vercel.com/v9/projects/${PROJECT_ID}/env" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" | \
              jq -r --arg k "$KEY" '.envs[] | select(.key==$k) | .id' | \
              while read -r ID; do
                curl -s -X DELETE \
                  "https://api.vercel.com/v9/projects/${PROJECT_ID}/env/${ID}" \
                  -H "Authorization: Bearer ${VERCEL_TOKEN}" > /dev/null
              done
            # Add new
            curl -sf -X POST \
              "https://api.vercel.com/v10/projects/${PROJECT_ID}/env" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"${KEY}\",\"value\":\"${VALUE}\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}" > /dev/null
            echo "  ✓ ${KEY}"
          }

          echo "→ Configuring NossoCRM..."
          set_env "NEXT_PUBLIC_SUPABASE_URL"             "$SUPABASE_URL"
          set_env "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" "$SUPABASE_ANON"
          set_env "SUPABASE_SECRET_KEY"                  "$SUPABASE_SVC"
          set_env "SMARTZAP_URL"                         "$SMARTZAP_URL"
          set_env "SMARTZAP_API_KEY"                     "$SMARTZAP_API_KEY"
          set_env "SMARTZAP_WEBHOOK_SECRET"              "$WEBHOOK_SECRET"
          set_env "NEXT_PUBLIC_APP_URL"                  "$NOSSOCRM_URL"
          echo "✅ NossoCRM env vars configured (7 vars)"

      # -----------------------------------------------------------------------
      - name: Configure SmartZap env vars (Vercel)
        env:
          VERCEL_TOKEN:  ${{ github.event.inputs.vercel_token }}
          SUPABASE_URL:  ${{ steps.supa.outputs.url }}
          SUPABASE_ANON: ${{ steps.supa.outputs.anon }}
          SUPABASE_SVC:  ${{ steps.supa.outputs.service }}
          NOSSOCRM_URL:  ${{ steps.vercel.outputs.nossocrm }}
        run: |
          PROJECT_ID=$(curl -sf "https://api.vercel.com/v9/projects/${SMARTZAP_PROJECT}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" | jq -r '.id')

          set_env() {
            local KEY="$1" VALUE="$2"
            curl -sf "https://api.vercel.com/v9/projects/${PROJECT_ID}/env" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" | \
              jq -r --arg k "$KEY" '.envs[] | select(.key==$k) | .id' | \
              while read -r ID; do
                curl -s -X DELETE \
                  "https://api.vercel.com/v9/projects/${PROJECT_ID}/env/${ID}" \
                  -H "Authorization: Bearer ${VERCEL_TOKEN}" > /dev/null
              done
            curl -sf -X POST \
              "https://api.vercel.com/v10/projects/${PROJECT_ID}/env" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"${KEY}\",\"value\":\"${VALUE}\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}" > /dev/null
            echo "  ✓ ${KEY}"
          }

          echo "→ Configuring SmartZap..."
          set_env "NEXT_PUBLIC_SUPABASE_URL"  "$SUPABASE_URL"
          set_env "NEXT_PUBLIC_SUPABASE_ANON_KEY" "$SUPABASE_ANON"
          set_env "SUPABASE_SERVICE_KEY"      "$SUPABASE_SVC"
          set_env "CRM_WEBHOOK_URL"           "${NOSSOCRM_URL}/api/webhooks/smartzap"
          set_env "CRM_WEBHOOK_SECRET"        "$WEBHOOK_SECRET"
          echo "✅ SmartZap env vars configured (5 vars)"

      # -----------------------------------------------------------------------
      - name: Redeploy NossoCRM
        env:
          VERCEL_TOKEN: ${{ github.event.inputs.vercel_token }}
        run: |
          DEPLOY_UID=$(curl -sf \
            "https://api.vercel.com/v6/deployments?projectId=${NOSSOCRM_PROJECT}&target=production&limit=1" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" | jq -r '.deployments[0].uid // empty')

          if [ -n "$DEPLOY_UID" ]; then
            curl -sf -X POST "https://api.vercel.com/v13/deployments?forceNew=1" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"deploymentId\":\"${DEPLOY_UID}\"}" > /dev/null
            echo "✅ NossoCRM redeploying..."
          else
            echo "⚠️  No production deployment found for NossoCRM — redeploy manually or via git push"
          fi

      # -----------------------------------------------------------------------
      - name: Redeploy SmartZap
        env:
          VERCEL_TOKEN: ${{ github.event.inputs.vercel_token }}
        run: |
          DEPLOY_UID=$(curl -sf \
            "https://api.vercel.com/v6/deployments?projectId=${SMARTZAP_PROJECT}&target=production&limit=1" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" | jq -r '.deployments[0].uid // empty')

          if [ -n "$DEPLOY_UID" ]; then
            curl -sf -X POST "https://api.vercel.com/v13/deployments?forceNew=1" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"deploymentId\":\"${DEPLOY_UID}\"}" > /dev/null
            echo "✅ SmartZap redeploying..."
          else
            echo "⚠️  No production deployment found for SmartZap — redeploy manually or via git push"
          fi

      # -----------------------------------------------------------------------
      - name: Summary
        env:
          NOSSOCRM_URL: ${{ steps.vercel.outputs.nossocrm }}
          SMARTZAP_URL:  ${{ steps.vercel.outputs.smartzap }}
        run: |
          {
            echo "## ✅ Integração configurada com sucesso!"
            echo ""
            echo "| App | URL |"
            echo "|-----|-----|"
            echo "| NossoCRM | ${NOSSOCRM_URL} |"
            echo "| SmartZap | ${SMARTZAP_URL} |"
            echo ""
            echo "**Webhook URL (configure no SmartZap):** \`${NOSSOCRM_URL}/api/webhooks/smartzap\`"
            echo ""
            echo "### Variáveis configuradas"
            echo "**NossoCRM (7 vars):** NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY, SUPABASE_SECRET_KEY, SMARTZAP_URL, SMARTZAP_API_KEY, SMARTZAP_WEBHOOK_SECRET, NEXT_PUBLIC_APP_URL"
            echo ""
            echo "**SmartZap (5 vars):** NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, SUPABASE_SERVICE_KEY, CRM_WEBHOOK_URL, CRM_WEBHOOK_SECRET"
          } >> "$GITHUB_STEP_SUMMARY"
